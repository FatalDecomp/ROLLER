[tools]
python = "3"
"ubi:zigtools/zls" = "0.15.0"
usage = "latest"
zig = "0.15.2"

[env]
EMSDK = "{{config_root}}/.tools/emsdk"
EM_CONFIG = "{{config_root}}/.tools/emsdk/.emscripten"
_.path = [
  "{{config_root}}/.tools/emsdk",
  "{{config_root}}/.tools/emsdk/upstream/emscripten",
  "{{config_root}}/.tools/emsdk/upstream/bin",
]

[hooks]
postinstall = { task = "install-emsdk" }

[tasks.build]
description = "Build for specific platform"
run = "python scripts/build.py"

[tasks.clean]
description = "Clean build artifacts"
run = "rm -rf zig-out .zig-cache"

[tasks.test]
description = "Run tests"
run = "zig build test"

[tasks.install-emsdk]
description = "Install the pinned Emscripten SDK"
run = "python scripts/install_emsdk.py"
