[tools]
clang-format = "latest"
hk = "1.45.0"
python = "3"
"ubi:zigtools/zls" = "0.15.0"
usage = "latest"
zig = "0.15.2"

[env]
HK_MISE = "1"
HK_PKL_BACKEND = "pklr"

[hooks]
postinstall = "hk install --mise"

[tasks.build]
description = "Build for specific platform"
run = "python scripts/build.py"

[tasks.clean]
description = "Clean build artifacts"
run = "rm -rf zig-out .zig-cache"

[tasks.test]
description = "Run tests"
run = "zig build test"

[tasks.pre-commit]
description = "Run pre-commit hooks"
run = "hk run pre-commit"
