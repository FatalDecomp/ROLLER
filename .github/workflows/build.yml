name: Reusable Build Workflow

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
        description: "Version string for the build"
      semver_version:
        required: false
        type: string
        description: "Semver version string for nightly/dev builds"
      git_hash:
        required: false
        type: string
        description: "Full git hash for the build"
      short_hash:
        required: false
        type: string
        description: "Short git hash for the build; legacy fallback"
      build_date:
        required: false
        type: string
        description: "UTC build date for build identity"
      dev_build:
        required: false
        type: boolean
        default: false
        description: "Build with nightly/dev crash debugging settings"

jobs:
  build:
    name: Build for ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runs-on }}
    env:
      # hk is only needed for local git hooks and is not distributed for every CI host.
      # Keep it out of workflow tool installation, including macOS x86_64.
      MISE_DISABLE_TOOLS: hk
      MISE_NO_HOOKS: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-gnu
            runs-on: ubuntu-latest
            os: linux
            arch: aarch64
            ext: ""
          - target: x86_64-linux-gnu
            runs-on: ubuntu-latest
            os: linux
            arch: x86_64
            ext: ""
          - target: x86_64-windows
            runs-on: ubuntu-latest
            os: windows
            arch: x86_64
            ext: ".exe"
          - target: aarch64-macos
            runs-on: macos-15
            os: macos
            arch: aarch64
            ext: ""
          - target: x86_64-macos
            runs-on: macos-15-intel
            os: macos
            arch: x86_64
            ext: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          experimental: true
          cache: true

      - name: Cache .zig-cache
        uses: actions/cache@v5
        with:
          path: .zig-cache
          key: zig-cache-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: |
            zig-cache-${{ matrix.os }}-${{ matrix.arch }}-
            zig-cache-

      - name: Build for ${{ matrix.os }} ${{ matrix.arch }}
        env:
          BUILD_VERSION: ${{ inputs.semver_version || inputs.version || 'local' }}
          BUILD_HASH: ${{ inputs.git_hash || inputs.short_hash || github.sha || 'unknown' }}
          BUILD_DATE_INPUT: ${{ inputs.build_date }}
          DEV_BUILD: ${{ inputs.dev_build }}
          MATRIX_RELEASE: ${{ matrix.release || '' }}
        run: |
          BUILD_DATE_VALUE="$BUILD_DATE_INPUT"
          if [ -z "$BUILD_DATE_VALUE" ]; then
            BUILD_DATE_VALUE="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          fi

          RELEASE_MODE="$MATRIX_RELEASE"
          if [ -z "$RELEASE_MODE" ]; then
            if [ "$DEV_BUILD" = "true" ]; then
              RELEASE_MODE="safe"
            else
              RELEASE_MODE="fast"
            fi
          fi

          CRASH_DEBUG_ARGS=""
          if [ "$DEV_BUILD" = "true" ]; then
            CRASH_DEBUG_ARGS="--crash-debug"
          fi

          BUILD_ID_ARGS=""
          if [ "${{ matrix.os }}" = "linux" ]; then
            BUILD_ID_ARGS="--build-id=sha1"
          fi

          mise run build \
            --target=${{ matrix.target }} \
            --release="$RELEASE_MODE" \
            --version="$BUILD_VERSION" \
            --git-hash="$BUILD_HASH" \
            --build-date="$BUILD_DATE_VALUE" \
            --build-target=${{ matrix.target }} \
            $CRASH_DEBUG_ARGS \
            $BUILD_ID_ARGS

      - name: Create output folder
        run: |
          mkdir -p dist

      - name: Copy files to output folder
        run: |
          cp zig-out/bin/* dist/
          cp -r midi dist/
          cp images/roller.ico dist/
          cp README.md dist/
          cp LICENSE.md dist/

      - name: Install Linux symbol tools
        if: matrix.os == 'linux' && inputs.dev_build
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            sudo apt-get update
            sudo apt-get install -y binutils-aarch64-linux-gnu
          fi

      - name: Create Linux debug symbols
        if: matrix.os == 'linux' && inputs.dev_build
        run: |
          OBJCOPY=objcopy
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            OBJCOPY=aarch64-linux-gnu-objcopy
          fi
          "$OBJCOPY" --only-keep-debug dist/roller dist/roller.debug
          "$OBJCOPY" --strip-debug --strip-unneeded dist/roller
          "$OBJCOPY" --add-gnu-debuglink=dist/roller.debug dist/roller

      - name: Create macOS debug symbols
        if: matrix.os == 'macos' && inputs.dev_build
        run: |
          dsymutil dist/roller -o dist/roller.dSYM

      - name: Verify debug symbols
        if: inputs.dev_build
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            test -f dist/roller.pdb
          elif [ "${{ matrix.os }}" = "linux" ]; then
            test -f dist/roller.debug
          elif [ "${{ matrix.os }}" = "macos" ]; then
            test -d dist/roller.dSYM
          fi

      - name: Package Windows/macOS build
        if: matrix.os == 'macos' || matrix.os == 'windows'
        run: |
          cd dist && zip -r ../roller-${{ matrix.os }}-${{ matrix.arch }}.zip *

      - name: Package Linux build
        if: matrix.os == 'linux'
        run: |
          cd dist && tar -czf ../roller-${{ matrix.os }}-${{ matrix.arch }}.tar.gz *

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: roller-${{ matrix.os }}-${{ matrix.arch }}
          path: roller-${{ matrix.os }}-${{ matrix.arch }}.*
          retention-days: 7
