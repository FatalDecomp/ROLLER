name: Build on Push

on:
  push:
    paths-ignore:
      - "**.md"
      - "LICENSE*"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "**.md"
      - "LICENSE*"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  get-version:
    name: Get version info
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      full_hash: ${{ steps.version.outputs.full_hash }}
      short_hash: ${{ steps.version.outputs.short_hash }}
      build_date: ${{ steps.version.outputs.build_date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version info
        id: version
        run: |
          # Extract version from build.zig.zon
          VERSION=$(grep -o '\.version = "[^"]*"' build.zig.zon | cut -d'"' -f2)
          FULL_HASH=$(git rev-parse HEAD)
          SHORT_HASH=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "full_hash=${FULL_HASH}" >> $GITHUB_OUTPUT
          echo "short_hash=${SHORT_HASH}" >> $GITHUB_OUTPUT
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT

  build:
    needs: get-version
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.get-version.outputs.version }}
      git_hash: ${{ needs.get-version.outputs.full_hash }}
      short_hash: ${{ needs.get-version.outputs.short_hash }}
      build_date: ${{ needs.get-version.outputs.build_date }}

  build-web:
    name: Build browser bundle
    needs: get-version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          experimental: true
          cache: true

      - name: Cache web build inputs
        uses: actions/cache@v5
        with:
          path: |
            .zig-cache
            zig-out/demo-cache
          key: web-${{ runner.os }}-eca6da4f64b97a400016ec8bd43fba713dcd237274d58f167d93e4149528414c-${{ hashFiles('build.zig', 'build.zig.zon', 'mise.toml', 'scripts/fetch_demo_assets.py', 'scripts/finalize_web_bundle.py') }}
          restore-keys: |
            web-${{ runner.os }}-eca6da4f64b97a400016ec8bd43fba713dcd237274d58f167d93e4149528414c-

      - name: Prepare demo assets
        run: python scripts/fetch_demo_assets.py

      - name: Build browser bundle
        env:
          BUILD_VERSION: ${{ needs.get-version.outputs.version }}
          BUILD_HASH: ${{ needs.get-version.outputs.full_hash }}
          BUILD_DATE_INPUT: ${{ needs.get-version.outputs.build_date }}
        run: |
          BUILD_DATE_VALUE="$BUILD_DATE_INPUT"
          if [ -z "$BUILD_DATE_VALUE" ]; then
            BUILD_DATE_VALUE="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          fi

          python scripts/build.py \
            --write-build-info-only \
            --version="$BUILD_VERSION" \
            --git-hash="$BUILD_HASH" \
            --build-date="$BUILD_DATE_VALUE" \
            --build-target=wasm32-emscripten
          zig build web \
            -Doptimize=ReleaseFast \
            -Ddemo-assets-path=zig-out/fatdata-demo

      - name: Upload browser bundle
        uses: actions/upload-artifact@v7
        with:
          name: roller-web
          path: zig-out/web
          if-no-files-found: error
          retention-days: 7
