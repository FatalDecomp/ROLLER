name: Build on Push

on:
  push:
    paths-ignore:
      - "**.md"
      - "LICENSE*"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "**.md"
      - "LICENSE*"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  get-version:
    name: Get version info
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      full_hash: ${{ steps.version.outputs.full_hash }}
      short_hash: ${{ steps.version.outputs.short_hash }}
      build_date: ${{ steps.version.outputs.build_date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version info
        id: version
        run: |
          # Extract version from build.zig.zon
          VERSION=$(grep -o '\.version = "[^"]*"' build.zig.zon | cut -d'"' -f2)
          FULL_HASH=$(git rev-parse HEAD)
          SHORT_HASH=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "full_hash=${FULL_HASH}" >> $GITHUB_OUTPUT
          echo "short_hash=${SHORT_HASH}" >> $GITHUB_OUTPUT
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT

  build:
    needs: get-version
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.get-version.outputs.version }}
      git_hash: ${{ needs.get-version.outputs.full_hash }}
      short_hash: ${{ needs.get-version.outputs.short_hash }}
      build_date: ${{ needs.get-version.outputs.build_date }}
